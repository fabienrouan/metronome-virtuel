<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Métronome virtuel</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: Georgia, serif; background: #1a1a2e; }
    body { display: flex; align-items: center; justify-content: center; padding: 1rem; min-height: 100vh; }
    .card { background: #f7f4ef; border-radius: 20px; padding: 1.4rem 1.5rem 1rem; max-width: 500px; width: 100%; box-shadow: 0 8px 40px rgba(0,0,0,0.4); }

    /* ── Header : métronome à gauche, titre centré, logo à droite ── */
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; gap: 8px; }
    .header-left { flex: 0 0 auto; }
    .header-center { flex: 1; display: flex; flex-direction: column; align-items: center; }
    .header-right { flex: 0 0 auto; }
    .logo { width: 52px; }
    .app-title { font-size: 18px; font-weight: normal; color: #2c2416; letter-spacing: 0.1em; text-transform: uppercase; text-align: center; }
    .app-subtitle { font-size: 10px; color: #9c8e7a; letter-spacing: 0.16em; text-transform: uppercase; margin-top: 2px; font-family: system-ui, sans-serif; }

    /* ── BPM ── */
    .bpm-display { font-size: 64px; font-weight: normal; color: #2c2416; text-align: center; line-height: 1; font-family: Georgia, serif; letter-spacing: -2px; }
    .bpm-label { font-size: 11px; color: #9c8e7a; text-align: center; margin-bottom: 2px; letter-spacing: 0.14em; text-transform: uppercase; font-family: system-ui, sans-serif; }
    .tempo-name { font-size: 20px; color: #5a4a2e; text-align: center; font-style: italic; }
    .tempo-range { font-size: 11px; color: #9c8e7a; text-align: center; margin-bottom: 0.6rem; font-family: system-ui, sans-serif; }
    .divider { width: 32px; height: 1px; background: #c8b99a; margin: 0 auto 0.7rem; }

    /* ── Slider ── */
    .slider-row { display: flex; align-items: center; gap: 8px; margin-bottom: 0.6rem; }
    .slider-row input[type=range] { flex: 1; accent-color: #8B6914; }
    .slider-end { font-size: 10px; color: #b0a080; min-width: 22px; font-family: system-ui, sans-serif; }

    /* ── Sections ── */
    .section { border-top: 1px solid #e8dece; padding: 8px 0; }
    .sec-label {
      font-size: 13px;
      font-family: Georgia, serif;
      color: #2c2416;
      text-align: center;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* ── Boutons choix ── */
    .btn-row { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; }
    .btn { padding: 7px 13px; border-radius: 20px; border: 1px solid #d4c4a8; background: white; color: #5a4a2e; font-size: 13px; cursor: pointer; transition: all 0.12s; font-family: system-ui, sans-serif; min-height: 36px; display: flex; align-items: center; }
    .btn:hover { background: #f0e8d8; }
    .btn.on { background: #8B6914; color: white; border-color: #8B6914; }
    .btn.on-bois { background: #5a7a30; color: white; border-color: #5a7a30; }
    .btn.on-metal { background: #3a5a8a; color: white; border-color: #3a5a8a; }

    /* ── Pulsation ── */
    .beats-row { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
    .dot { width: 38px; height: 38px; border-radius: 50%; background: white; border: 1px solid #d4c4a8; display: flex; align-items: center; justify-content: center; font-size: 13px; color: #b0a080; transition: all 0.06s; font-family: system-ui, sans-serif; }
    .dot.ac { border: 2px solid #8B6914; color: #8B6914; font-weight: bold; }
    .dot.flash-ac { background: #8B6914 !important; color: white !important; transform: scale(1.2); }
    .dot.flash { background: #f0e8d8 !important; transform: scale(1.1); border-color: #c8a84a; }

    /* ── Play ── */
    .play-btn { display: block; margin: 0.75rem auto 0; padding: 11px 52px; border-radius: 40px; border: 1.5px solid #8B6914; background: white; color: #8B6914; font-size: 13px; cursor: pointer; transition: all 0.15s; letter-spacing: 0.1em; text-transform: uppercase; font-family: system-ui, sans-serif; }
    .play-btn:hover, .play-btn.on { background: #8B6914; color: white; }

    /* ── Tap tempo ── */
    .tap-section { border-top: 1px solid #e8dece; padding-top: 0.75rem; margin-top: 0.75rem; }
    .tap-title { font-size: 13px; font-family: Georgia, serif; color: #2c2416; text-align: center; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 8px; }
    .tap-btn { display: block; width: 100%; padding: 18px 0; border-radius: 12px; border: 2px dashed #c8b99a; background: white; color: #9c8e7a; font-size: 13px; cursor: pointer; transition: all 0.1s; letter-spacing: 0.1em; text-transform: uppercase; font-family: system-ui, sans-serif; text-align: center; user-select: none; -webkit-user-select: none; }
    .tap-btn:active, .tap-btn.tapped { background: #fdf6e8; border-color: #8B6914; color: #8B6914; transform: scale(0.985); }
    .tap-hint { font-size: 10px; color: #c0b090; text-align: center; margin-top: 6px; font-family: system-ui, sans-serif; letter-spacing: 0.06em; min-height: 14px; }

    .footer { margin-top: 0.75rem; font-size: 9px; color: #c0b090; text-align: center; font-family: system-ui, sans-serif; letter-spacing: 0.06em; }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      body { padding: 0; align-items: flex-start; background: #f7f4ef; }
      .card { border-radius: 0; padding: 1rem 1.25rem 1rem; box-shadow: none; min-height: 100dvh; }
      .play-btn { width: 100%; }
      .tap-btn { padding: 22px 0; }
      .btn { min-height: 40px; }
      .dot { width: 42px; height: 42px; }
    }
  </style>
</head>

// Chargement des buffers audio via base64 -> ArrayBuffer (sans fetch)
const audioBuffers = {};

function base64ToArrayBuffer(b64) {
  const bin = atob(b64.split(',')[1]);
  const buf = new ArrayBuffer(bin.length);
  const view = new Uint8Array(buf);
  for (let i = 0; i < bin.length; i++) view[i] = bin.charCodeAt(i);
  return buf;
}

function loadAudioBuffers(actx) {
  Object.entries(AUDIO_DATA).forEach(([key, dataUrl]) => {
    try {
      const arrayBuf = base64ToArrayBuffer(dataUrl);
      actx.decodeAudioData(arrayBuf,
        buf => { audioBuffers[key] = buf; },
        err => console.error('Decode error', key, err)
      );
    } catch(e) { console.error('Load error', key, e); }
  });
}

function playBuffer(key, t, vol) {
  if (!audioBuffers[key]) return;
  const src = ctx.createBufferSource();
  src.buffer = audioBuffers[key];
  const g = ctx.createGain();
  g.gain.setValueAtTime(vol, Math.max(t, ctx.currentTime));
  src.connect(g);
  g.connect(ctx.destination);
  src.start(Math.max(t, ctx.currentTime));
}

const TEMPOS=[
  {name:"Grave",      min:40,  max:50,  caractere:"solennel, lourd"},
  {name:"Largo",      min:40,  max:60,  caractere:"très large, étiré"},
  {name:"Lento",      min:45,  max:60,  caractere:"lent, neutre"},
  {name:"Larghetto",  min:60,  max:66,  caractere:"un peu moins lent"},
  {name:"Adagio",     min:60,  max:72,  caractere:"calme, expressif"},
  {name:"Andante",    min:72,  max:92,  caractere:"marche, régulier"},
  {name:"Moderato",   min:88,  max:108, caractere:"modéré, stable"},
  {name:"Allegretto", min:100, max:120, caractere:"assez vif"},
  {name:"Allegro",    min:120, max:144, caractere:"rapide, énergique"},
  {name:"Vivace",     min:140, max:168, caractere:"vif, brillant"},
  {name:"Presto",     min:168, max:200, caractere:"très rapide"},
  {name:"Prestissimo",min:200, max:220, caractere:"extrême"},
];

function getTempo(b){
  const matches = TEMPOS.filter(t => b >= t.min && b <= t.max);
  if(matches.length === 0) return {name: b < 40 ? "Grave" : "Prestissimo", caractere: "", multi: false};
  return {
    name: matches.map(t => t.name).join(' · '),
    caractere: matches.map(t => t.caractere).filter((v,i,a)=>a.indexOf(v)===i).join(', '),
    multi: matches.length > 1
  };
}
let bpm=90,beats=4,beat=-1,running=false,nextTime=0,ctx=null,timer=null,timbre='neutre';
let pAngle=0,pDir=1,pAnim=null;



function renderDots(){
  const r=document.getElementById('bRow');r.innerHTML='';
  for(let i=0;i<beats;i++){const d=document.createElement('div');d.className='dot'+(i===0?' ac':'');d.textContent=i+1;r.appendChild(d);}
}
function updateBpm(v,fromSlider){
  bpm=Math.min(208,Math.max(40,parseInt(v)));
  document.getElementById('bpmVal').textContent=bpm;
  const t=getTempo(bpm);
  const nameEl=document.getElementById('tName');
  nameEl.textContent=t.name;
  nameEl.style.fontSize=t.multi?'16px':'20px';
  document.getElementById('tRange').textContent=t.caractere;
  if(!fromSlider)document.getElementById('sl').value=bpm;
}
let swingStartTime = null;

function swingStep(timestamp){
  if(!swingStartTime) swingStartTime = timestamp;
  // Durée d'un aller-retour complet = 2 temps = 2 * (60000/bpm) ms
  const period = 2 * (60000 / bpm);
  const elapsed = (timestamp - swingStartTime) % period;
  // progression de 0 à 1 sur la période
  const phase = elapsed / period;
  // sinus donne un mouvement naturel : -1 → +1 → -1
  const angle = 26 * Math.sin(2 * Math.PI * phase);
  const rad = angle * Math.PI / 180;
  const cx=45, cy=18, len=62;
  const ex = cx + Math.sin(rad) * len;
  const ey = cy + Math.cos(rad) * len;
  document.getElementById('pendule').setAttribute('x2',ex.toFixed(1));
  document.getElementById('pendule').setAttribute('y2',ey.toFixed(1));
  document.getElementById('lentille').setAttribute('cx',ex.toFixed(1));
  document.getElementById('lentille').setAttribute('cy',ey.toFixed(1));
  document.getElementById('lentille2').setAttribute('cx',ex.toFixed(1));
  document.getElementById('lentille2').setAttribute('cy',ey.toFixed(1));
  if(running) pAnim=requestAnimationFrame(swingStep);
}
function flash(b){
  const dots=document.getElementById('bRow').querySelectorAll('.dot');
  dots.forEach((d,i)=>{d.classList.remove('flash','flash-ac');if(i===0)d.classList.add('ac');else d.classList.remove('ac');});
  if(!dots[b])return;
  dots[b].classList.remove('ac');
  dots[b].classList.add(b===0?'flash-ac':'flash');
  setTimeout(()=>{dots.forEach((d,i)=>{d.classList.remove('flash','flash-ac');if(i===0)d.classList.add('ac');});},110);
}
function makeCtx(){
  if(!ctx){
    ctx=new(window.AudioContext||window.webkitAudioContext)();
    loadAudioBuffers(ctx);
  }
  if(ctx.state==='suspended')ctx.resume();
}
function noise(dur){const n=Math.ceil(ctx.sampleRate*dur),buf=ctx.createBuffer(1,n,ctx.sampleRate),d=buf.getChannelData(0);for(let i=0;i<n;i++)d[i]=Math.random()*2-1;const s=ctx.createBufferSource();s.buffer=buf;return s;}
function playNeutre(t,a){const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=a?1200:900;g.gain.setValueAtTime(a?0.7:0.4,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.08);o.start(t);o.stop(t+0.1);}
function playBois(t,a){
  playBuffer(a?'wb_accent':'wb_normal', t, a?1.0:0.75);
}
function playMetal(t,a){
  playBuffer(a?'tri_accent':'tri_normal', t, a?1.0:0.75);
}
function playSound(t,a){if(timbre==='neutre')playNeutre(t,a);else if(timbre==='bois')playBois(t,a);else playMetal(t,a);}
function schedule(){while(nextTime<ctx.currentTime+0.1){const b=(beat+1)%beats;playSound(nextTime,b===0);const delay=Math.max(0,(nextTime-ctx.currentTime)*1000);setTimeout(()=>{if(running)flash(b);},delay);beat=b;nextTime+=60/bpm;}timer=setTimeout(schedule,25);}
function start(){makeCtx();running=true;beat=-1;nextTime=ctx.currentTime+0.05;swingStartTime=null;document.getElementById('playBtn').textContent='Arrêter';document.getElementById('playBtn').classList.add('on');pAnim=requestAnimationFrame(swingStep);schedule();}
function stop(){running=false;clearTimeout(timer);cancelAnimationFrame(pAnim);document.getElementById('playBtn').textContent='Démarrer';document.getElementById('playBtn').classList.remove('on');beat=-1;pAngle=0;['pendule','lentille','lentille2'].forEach(id=>{const el=document.getElementById(id);if(id==='pendule'){el.setAttribute('x2','60');el.setAttribute('y2','80');}else{el.setAttribute('cx','60');el.setAttribute('cy','80');}});const dots=document.getElementById('bRow').querySelectorAll('.dot');dots.forEach((d,i)=>{d.classList.remove('flash','flash-ac');if(i===0)d.classList.add('ac');else d.classList.remove('ac');});}

/* Tap tempo */
let tapTimes=[],tapResetTimer=null;
function handleTap(){
  const now=performance.now();
  clearTimeout(tapResetTimer);
  tapResetTimer=setTimeout(()=>{tapTimes=[];document.getElementById('tapHint').textContent='Tape au moins 2 fois pour détecter le tempo';},2500);
  tapTimes.push(now);
  if(tapTimes.length>8)tapTimes=tapTimes.slice(-8);
  const btn=document.getElementById('tapBtn');
  btn.classList.add('tapped');setTimeout(()=>btn.classList.remove('tapped'),120);
  if(tapTimes.length<2){document.getElementById('tapHint').textContent='Continue à taper…';return;}
  const intervals=[];
  for(let i=1;i<tapTimes.length;i++)intervals.push(tapTimes[i]-tapTimes[i-1]);
  const avg=intervals.reduce((a,b)=>a+b,0)/intervals.length;
  const detected=Math.round(60000/avg);
  if(detected<30||detected>300){document.getElementById('tapHint').textContent='Tempo hors plage, recommence';return;}
  const clamped=Math.min(208,Math.max(40,detected));
  const n=tapTimes.length;
  document.getElementById('tapHint').textContent=n<4?'Continue pour plus de précision…':n<6?'Bonne précision ('+n+' frappes)':'Très bonne précision ('+n+' frappes)';
  updateBpm(clamped);
  if(running){stop();setTimeout(start,80);}
}
document.getElementById('tapBtn').addEventListener('mousedown',e=>{e.preventDefault();handleTap();});
document.getElementById('tapBtn').addEventListener('touchstart',e=>{e.preventDefault();handleTap();},{passive:false});
document.addEventListener('keydown',e=>{if(e.code==='Space'&&e.target===document.body){e.preventDefault();handleTap();}});

document.getElementById('sl').addEventListener('input',e=>updateBpm(e.target.value,true));
document.getElementById('mRow').addEventListener('click',e=>{const btn=e.target.closest('.btn');if(!btn)return;document.getElementById('mRow').querySelectorAll('.btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');beats=parseInt(btn.dataset.n);beat=-1;renderDots();});
document.getElementById('tRow').addEventListener('click',e=>{const btn=e.target.closest('.btn');if(!btn)return;document.getElementById('tRow').querySelectorAll('.btn').forEach(b=>b.classList.remove('on','on-bois','on-metal'));timbre=btn.dataset.t;if(timbre==='bois')btn.classList.add('on-bois');else if(timbre==='metal')btn.classList.add('on-metal');else btn.classList.add('on');});
document.getElementById('playBtn').addEventListener('click',()=>{running?stop():start();});

renderDots();updateBpm(90);
</script>
