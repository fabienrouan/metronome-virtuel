<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Métronome virtuel</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #f7f4ef;
      border-radius: 20px;
      padding: 2.5rem 2rem 2rem;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 1.75rem;
      position: relative;
    }
    .logo { position: absolute; top: 0; right: 0; width: 58px; }
    .metro-figure { margin-bottom: 10px; }
    .app-title {
      font-size: 22px;
      font-weight: normal;
      color: #2c2416;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-align: center;
      font-family: Georgia, serif;
    }
    .app-subtitle {
      font-size: 12px;
      color: #9c8e7a;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-top: 3px;
      font-family: system-ui, sans-serif;
    }
    .bpm-display {
      font-size: 68px;
      font-weight: normal;
      color: #2c2416;
      text-align: center;
      line-height: 1;
      margin-bottom: 2px;
      font-family: Georgia, serif;
      letter-spacing: -2px;
    }
    .bpm-label { font-size: 12px; color: #9c8e7a; text-align: center; margin-bottom: 4px; letter-spacing: 0.14em; text-transform: uppercase; font-family: system-ui, sans-serif; }
    .tempo-name { font-size: 24px; font-weight: normal; color: #5a4a2e; text-align: center; margin-bottom: 2px; font-family: Georgia, serif; font-style: italic; }
    .tempo-range { font-size: 12px; color: #9c8e7a; text-align: center; margin-bottom: 1.25rem; font-family: system-ui, sans-serif; }
    .divider { width: 40px; height: 1px; background: #c8b99a; margin: 0 auto 1.25rem; }
    .slider-row { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; }
    .slider-row input[type=range] { flex: 1; accent-color: #8B6914; height: 3px; }
    .slider-end { font-size: 11px; color: #b0a080; min-width: 24px; font-family: system-ui, sans-serif; }
    .sec-label { font-size: 10px; color: #b0a080; text-align: center; margin-bottom: 7px; letter-spacing: 0.12em; text-transform: uppercase; font-family: system-ui, sans-serif; }
    .btn-row { display: flex; justify-content: center; gap: 6px; margin-bottom: 1.4rem; flex-wrap: wrap; }
    .btn { padding: 5px 13px; border-radius: 20px; border: 1px solid #d4c4a8; background: white; color: #5a4a2e; font-size: 13px; cursor: pointer; transition: all 0.12s; font-family: system-ui, sans-serif; }
    .btn:hover { background: #f0e8d8; }
    .btn.on { background: #8B6914; color: white; border-color: #8B6914; }
    .btn.on-bois { background: #5a7a30; color: white; border-color: #5a7a30; }
    .btn.on-metal { background: #3a5a8a; color: white; border-color: #3a5a8a; }
    .beats-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .dot { width: 38px; height: 38px; border-radius: 50%; background: white; border: 1px solid #d4c4a8; display: flex; align-items: center; justify-content: center; font-size: 13px; color: #b0a080; transition: all 0.06s; font-family: system-ui, sans-serif; }
    .dot.ac { border: 2px solid #8B6914; color: #8B6914; font-weight: bold; }
    .dot.flash-ac { background: #8B6914 !important; color: white !important; transform: scale(1.2); border-color: #8B6914; }
    .dot.flash { background: #f0e8d8 !important; transform: scale(1.1); border-color: #c8a84a; }
    .play-btn {
      display: block; margin: 0 auto 1.25rem;
      padding: 11px 52px;
      border-radius: 40px;
      border: 1.5px solid #8B6914;
      background: white;
      color: #8B6914;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: system-ui, sans-serif;
    }
    .play-btn:hover { background: #8B6914; color: white; }
    .play-btn.on { background: #8B6914; color: white; }

    /* ── Tap tempo ── */
    .tap-section {
      border-top: 1px solid #e8dece;
      padding-top: 1.25rem;
      margin-top: 0.25rem;
    }
    .tap-btn {
      display: block;
      width: 100%;
      padding: 22px 0;
      border-radius: 14px;
      border: 2px dashed #c8b99a;
      background: white;
      color: #9c8e7a;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.1s;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-family: system-ui, sans-serif;
      text-align: center;
      user-select: none;
      -webkit-user-select: none;
      position: relative;
      overflow: hidden;
    }
    .tap-btn:active, .tap-btn.tapped {
      background: #fdf6e8;
      border-color: #8B6914;
      color: #8B6914;
      transform: scale(0.985);
    }
    .tap-title {
      font-size: 15px;
      font-family: Georgia, serif;
      color: #2c2416;
      text-align: center;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .tap-hint {
      font-size: 11px;
      color: #c0b090;
      text-align: center;
      margin-top: 6px;
      font-family: system-ui, sans-serif;
      letter-spacing: 0.06em;
      min-height: 16px;
    }

    .footer { margin-top: 1.5rem; font-size: 10px; color: #c0b090; text-align: center; font-family: system-ui, sans-serif; letter-spacing: 0.06em; }

    /* ── Responsive smartphone ── */
    @media (max-width: 480px) {
      body {
        padding: 0;
        align-items: flex-start;
        background: #f7f4ef;
      }
      .card {
        border-radius: 0;
        padding: 1.5rem 1.25rem 2rem;
        box-shadow: none;
        min-height: 100vh;
      }
      .logo { width: 48px; }
      .metro-figure { width: 70px; height: 92px; }
      .app-title { font-size: 18px; }
      .app-subtitle { font-size: 11px; }
      .header { margin-bottom: 1.25rem; }
      .bpm-display { font-size: 80px; }
      .tempo-name { font-size: 22px; }
      .slider-row input[type=range] { height: 6px; }
      .sec-label { font-size: 11px; margin-bottom: 10px; }
      .btn {
        padding: 9px 16px;
        font-size: 15px;
        min-height: 44px;
        display: flex;
        align-items: center;
      }
      .btn-row { gap: 8px; margin-bottom: 1.6rem; }
      .dot {
        width: 48px;
        height: 48px;
        font-size: 15px;
      }
      .beats-row { gap: 12px; margin-bottom: 1.6rem; }
      .play-btn {
        padding: 16px 52px;
        font-size: 16px;
        width: 100%;
      }
      .tap-title { font-size: 16px; }
      .tap-btn {
        padding: 36px 0;
        font-size: 15px;
        border-radius: 16px;
      }
      .tap-hint { font-size: 12px; margin-top: 10px; }
    }
  </style>
</head>

<script>
const TEMPOS=[
  {name:"Grave",min:40,max:59,label:"40 – 59 BPM"},
  {name:"Larghetto",min:60,max:65,label:"60 – 65 BPM"},
  {name:"Adagio",min:66,max:75,label:"66 – 75 BPM"},
  {name:"Andante",min:76,max:107,label:"76 – 107 BPM"},
  {name:"Moderato",min:108,max:119,label:"108 – 119 BPM"},
  {name:"Allegretto",min:120,max:155,label:"120 – 155 BPM"},
  {name:"Allegro",min:156,max:175,label:"156 – 175 BPM"},
  {name:"Vivace",min:176,max:199,label:"176 – 199 BPM"},
  {name:"Presto",min:200,max:208,label:"200 – 208 BPM"},
];

let bpm=90,beats=4,beat=-1,running=false,nextTime=0,ctx=null,timer=null,timbre='neutre';
let pAngle=0,pDir=1,pAnim=null;

function getTempo(b){for(let t of TEMPOS)if(b>=t.min&&b<=t.max)return t;return b<40?TEMPOS[0]:TEMPOS[TEMPOS.length-1];}

function renderDots(){
  const r=document.getElementById('bRow');r.innerHTML='';
  for(let i=0;i<beats;i++){const d=document.createElement('div');d.className='dot'+(i===0?' ac':'');d.textContent=i+1;r.appendChild(d);}
}

function updateBpm(v,fromSlider){
  bpm=Math.min(208,Math.max(40,parseInt(v)));
  document.getElementById('bpmVal').textContent=bpm;
  const t=getTempo(bpm);
  document.getElementById('tName').textContent=t.name;
  document.getElementById('tRange').textContent=t.label;
  if(!fromSlider) document.getElementById('sl').value=bpm;
}

function swingStep(){
  const speed=Math.max(1.5,4-bpm/80);
  pAngle+=pDir*speed;
  if(pAngle>26||pAngle<-26)pDir*=-1;
  const rad=pAngle*Math.PI/180,cx=45,cy=18,len=62;
  const ex=cx+Math.sin(rad)*len,ey=cy+Math.cos(rad)*len;
  document.getElementById('pendule').setAttribute('x2',ex.toFixed(1));
  document.getElementById('pendule').setAttribute('y2',ey.toFixed(1));
  document.getElementById('lentille').setAttribute('cx',ex.toFixed(1));
  document.getElementById('lentille').setAttribute('cy',ey.toFixed(1));
  document.getElementById('lentille2').setAttribute('cx',ex.toFixed(1));
  document.getElementById('lentille2').setAttribute('cy',ey.toFixed(1));
  if(running)pAnim=requestAnimationFrame(swingStep);
}

function flash(b){
  const dots=document.getElementById('bRow').querySelectorAll('.dot');
  dots.forEach((d,i)=>{d.classList.remove('flash','flash-ac');if(i===0)d.classList.add('ac');else d.classList.remove('ac');});
  if(!dots[b])return;
  dots[b].classList.remove('ac');
  dots[b].classList.add(b===0?'flash-ac':'flash');
  setTimeout(()=>{dots.forEach((d,i)=>{d.classList.remove('flash','flash-ac');if(i===0)d.classList.add('ac');});},110);
}

function makeCtx(){if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();if(ctx.state==='suspended')ctx.resume();}
function noise(dur){const n=Math.ceil(ctx.sampleRate*dur),buf=ctx.createBuffer(1,n,ctx.sampleRate),d=buf.getChannelData(0);for(let i=0;i<n;i++)d[i]=Math.random()*2-1;const s=ctx.createBufferSource();s.buffer=buf;return s;}
function playNeutre(t,a){const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=a?1200:900;g.gain.setValueAtTime(a?0.7:0.4,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.08);o.start(t);o.stop(t+0.1);}
function playBois(t,a){const n=noise(0.06),bp=ctx.createBiquadFilter(),ng=ctx.createGain();bp.type='bandpass';bp.frequency.value=a?800:600;bp.Q.value=4;ng.gain.setValueAtTime(a?0.5:0.3,t);ng.gain.exponentialRampToValueAtTime(0.001,t+0.055);n.connect(bp);bp.connect(ng);ng.connect(ctx.destination);n.start(t);n.stop(t+0.07);const o=ctx.createOscillator(),og=ctx.createGain();o.type='triangle';o.frequency.value=a?350:260;og.gain.setValueAtTime(a?0.3:0.18,t);og.gain.exponentialRampToValueAtTime(0.001,t+0.09);o.connect(og);og.connect(ctx.destination);o.start(t);o.stop(t+0.1);}
function playMetal(t,a){[a?2000:1600,a?2800:2200,a?3800:3000,a?5200:4200].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type='sawtooth';o.frequency.value=f;g.gain.setValueAtTime((a?0.15:0.09)/(i+1),t);g.gain.exponentialRampToValueAtTime(0.001,t+(a?0.25:0.15));o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+0.3);});const n=noise(0.015),hp=ctx.createBiquadFilter(),ng=ctx.createGain();hp.type='highpass';hp.frequency.value=4000;ng.gain.setValueAtTime(a?0.4:0.25,t);ng.gain.exponentialRampToValueAtTime(0.001,t+0.02);n.connect(hp);hp.connect(ng);ng.connect(ctx.destination);n.start(t);n.stop(t+0.02);}
function playSound(t,a){if(timbre==='neutre')playNeutre(t,a);else if(timbre==='bois')playBois(t,a);else playMetal(t,a);}

function schedule(){while(nextTime<ctx.currentTime+0.1){const b=(beat+1)%beats;playSound(nextTime,b===0);const delay=Math.max(0,(nextTime-ctx.currentTime)*1000);setTimeout(()=>{if(running)flash(b);},delay);beat=b;nextTime+=60/bpm;}timer=setTimeout(schedule,25);}

function start(){makeCtx();running=true;beat=-1;nextTime=ctx.currentTime+0.05;document.getElementById('playBtn').textContent='Arrêter';document.getElementById('playBtn').classList.add('on');pAnim=requestAnimationFrame(swingStep);schedule();}
function stop(){running=false;clearTimeout(timer);cancelAnimationFrame(pAnim);document.getElementById('playBtn').textContent='Démarrer';document.getElementById('playBtn').classList.remove('on');beat=-1;pAngle=0;const p=document.getElementById('pendule'),l=document.getElementById('lentille'),l2=document.getElementById('lentille2');p.setAttribute('x2','60');p.setAttribute('y2','80');l.setAttribute('cx','60');l.setAttribute('cy','80');l2.setAttribute('cx','60');l2.setAttribute('cy','80');const dots=document.getElementById('bRow').querySelectorAll('.dot');dots.forEach((d,i)=>{d.classList.remove('flash','flash-ac');if(i===0)d.classList.add('ac');else d.classList.remove('ac');});}

/* ── Tap tempo ── */
let tapTimes=[];
let tapResetTimer=null;

function handleTap(){
  const now=performance.now();

  clearTimeout(tapResetTimer);
  tapResetTimer=setTimeout(()=>{
    tapTimes=[];
    document.getElementById('tapHint').textContent='Tape au moins 2 fois pour détecter le tempo';
  },2500);

  tapTimes.push(now);
  if(tapTimes.length>8) tapTimes=tapTimes.slice(-8);

  const btn=document.getElementById('tapBtn');
  btn.classList.add('tapped');
  setTimeout(()=>btn.classList.remove('tapped'),120);

  if(tapTimes.length<2){
    document.getElementById('tapHint').textContent='Continue à taper…';
    return;
  }

  const intervals=[];
  for(let i=1;i<tapTimes.length;i++) intervals.push(tapTimes[i]-tapTimes[i-1]);
  const avgInterval=intervals.reduce((a,b)=>a+b,0)/intervals.length;
  const detectedBpm=Math.round(60000/avgInterval);

  if(detectedBpm<30||detectedBpm>300){
    document.getElementById('tapHint').textContent='Tempo hors plage, recommence';
    return;
  }

  const clamped=Math.min(208,Math.max(40,detectedBpm));
  const taps=tapTimes.length;
  document.getElementById('tapHint').textContent=
    taps<4 ? 'Continue pour plus de précision…'
    : taps<6 ? 'Bonne précision ('+taps+' frappes)'
    : 'Très bonne précision ('+taps+' frappes)';

  updateBpm(clamped);
  if(running){stop();setTimeout(start,80);}
}

document.getElementById('tapBtn').addEventListener('mousedown', e=>{e.preventDefault();handleTap();});
document.getElementById('tapBtn').addEventListener('touchstart', e=>{e.preventDefault();handleTap();},{passive:false});
document.addEventListener('keydown', e=>{if(e.code==='Space'&&e.target===document.body){e.preventDefault();handleTap();}});

document.getElementById('sl').addEventListener('input',e=>updateBpm(e.target.value,true));
document.getElementById('mRow').addEventListener('click',e=>{const btn=e.target.closest('.btn');if(!btn)return;document.getElementById('mRow').querySelectorAll('.btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');beats=parseInt(btn.dataset.n);beat=-1;renderDots();});
document.getElementById('tRow').addEventListener('click',e=>{const btn=e.target.closest('.btn');if(!btn)return;document.getElementById('tRow').querySelectorAll('.btn').forEach(b=>b.classList.remove('on','on-bois','on-metal'));timbre=btn.dataset.t;if(timbre==='bois')btn.classList.add('on-bois');else if(timbre==='metal')btn.classList.add('on-metal');else btn.classList.add('on');});
document.getElementById('playBtn').addEventListener('click',()=>{running?stop():start();});

renderDots();updateBpm(90);
</script>
